<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Q4 Drill 2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: monospace;
            color: brown;
            background-color: rgb(255, 221, 221);

        }

        h1 {
            font-weight: bold;
            color: red;
        }

        .card {
            border-radius: 15px;
            background-color: rgb(242, 108, 55);
        }
        
    
    </style>
</head>

<body>

<div class="container mt-5">
    <h1 class="text-center">☀️Heat Index Checker</h1>
    <p class="text-center">Enter temperature and humidity to calculate how hot it feels.</p>

    <button class="btn btn-danger mb-3" onclick="toggleInstructions()">
        Show Instructions
    </button>

    <p id="instructions" class="alert alert-secondary" style"">
        Enter the temperature (°C) and humidity (%), then click the button to check the heat index and status.
    </p>

    <div class="card p-4 shadow">
        <label>Temperature (°C):</label>
        <input type="number" id="temp" class="form-control mb-2">

        <label>Humidity (%):</label>
        <input type="number" id="humidity" class="form-control mb-3">

        <button class="btn btn-danger" onclick="calculateHeatIndex()">CHECK HEAT INDEX</button>
    </div>

    <h3 class="mt-4 text-center" id="result"></h3>

    <p class="mt-3 text-center">
        Source: 
        <a href="https://www.pagasa.dost.gov.ph/weather/heat-index" target="_blank">
            PAGASA
        </a>
    </p>
</div>

<script>
    function toggleInstructions(){
        var instr = document.getElementById("instructions");

        if(instr.style.display === "none"){
            instr.style.display = "block";
        } else {
            instr.style.display = "none";
        }
    }

    function calculateHeatIndex(){

        var temperature = parseFloat(document.getElementById("temp").value);
        var humidity = parseFloat(document.getElementById("humidity").value);
        var heatIndex = temperature + (0.33 * humidity) - 4;

        var status;

        if (heatIndex <= 27){
            status = "Comfortable / Cool";
        } 
        else if (heatIndex >= 28 && heatIndex <= 32){
            status = "Warm";
        } 
        else if (heatIndex >= 33 && heatIndex <= 37){
            status = "Hot";
        } 
        else if (heatIndex >= 38 && heatIndex <= 41){
            status = "Very Hot / Caution";
        } 
        else {
            status = "Extreme Heat / Danger";
        }

        document.getElementById("result").innerHTML =
            "Heat Index: " + heatIndex.toFixed(2) + "°C <br>Status: " + status;
    }
</script>

</body>
</html>
